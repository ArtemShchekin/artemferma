<svg width="1440" height="2400" viewBox="0 0 1440 2400" xmlns="http://www.w3.org/2000/svg">
  <!-- PAGE: PROFILE TAB -->
  <!-- Farm Game — Profile Screen Mockup for Figma -->
  
  <defs>
    <style>
      .title { font-family: 'Comic Sans MS', cursive; font-size: 24px; font-weight: 700; fill: #7a4f2c; }
      .label { font-family: 'Comic Sans MS', cursive; font-size: 16px; font-weight: 700; fill: #7a4f2c; }
      .body { font-family: 'Comic Sans MS', cursive; font-size: 14px; fill: #5d4037; }
      .money { font-family: 'Comic Sans MS', cursive; font-size: 14px; font-weight: 800; fill: #1b5e20; }
      .small { font-family: 'Comic Sans MS', cursive; font-size: 12px; fill: #5d4037; }
    </style>
  </defs>
  
  <!-- BACKGROUND -->
  <rect width="1440" height="2400" fill="#f7f2ef"/>
  
  <!-- HEADER -->
  <g transform="translate(0, 0)">
    <rect width="1440" height="80" fill="rgba(255,255,255,0.7)"/>
    <circle cx="60" cy="40" r="20" fill="#ffd66b" stroke="#7a4f2c" stroke-width="2"/>
    <text x="60" y="47" text-anchor="middle" class="label" font-size="20">🥕</text>
    <rect x="100" y="25" width="100" height="30" fill="#ffd66b" stroke="#7a4f2c" stroke-width="2" rx="999"/>
    <text x="150" y="45" class="label" text-anchor="middle">Ферма</text>
    <rect x="1280" y="20" width="120" height="40" fill="#e84c3d" stroke="#7a4f2c" stroke-width="2" rx="12"/>
    <text x="1340" y="45" class="label" text-anchor="middle" fill="#fff">Выйти</text>
  </g>
  
  <!-- TABS NAVIGATION -->
  <g transform="translate(0, 80)">
    <rect width="1440" height="70" fill="#f7f2ef"/>
    
    <!-- Tab: Profile (Active) -->
    <g transform="translate(20, 10)">
      <rect width="140" height="50" fill="#ffffff" stroke="#7a4f2c" stroke-width="2" rx="999"/>
      <circle cx="25" cy="25" r="12" fill="#7a4f2c"/>
      <text x="50" y="30" class="label">Профиль</text>
    </g>
    
    <!-- Tab: Shop -->
    <g transform="translate(170, 10)">
      <rect width="140" height="50" fill="#ffd66b" stroke="#7a4f2c" stroke-width="2" rx="999"/>
      <rect x="0" y="46" width="140" height="4" fill="#7a4f2c" rx="2"/>
      <circle cx="25" cy="25" r="12" fill="#7a4f2c"/>
      <text x="50" y="30" class="label">Магазин</text>
    </g>
    
    <!-- Tab: Garden -->
    <g transform="translate(320, 10)">
      <rect width="140" height="50" fill="#ffd66b" stroke="#7a4f2c" stroke-width="2" rx="999"/>
      <rect x="0" y="46" width="140" height="4" fill="#7a4f2c" rx="2"/>
      <circle cx="25" cy="25" r="12" fill="#7a4f2c"/>
      <text x="50" y="30" class="label">Грядка</text>
    </g>
    
    <!-- Tab: Inventory -->
    <g transform="translate(470, 10)">
      <rect width="140" height="50" fill="#ffd66b" stroke="#7a4f2c" stroke-width="2" rx="999"/>
      <rect x="0" y="46" width="140" height="4" fill="#7a4f2c" rx="2"/>
      <circle cx="25" cy="25" r="12" fill="#7a4f2c"/>
      <text x="50" y="30" class="label">Инвентарь</text>
    </g>
    
    <!-- Tab: Kitchen -->
    <g transform="translate(620, 10)">
      <rect width="140" height="50" fill="#ffd66b" stroke="#7a4f2c" stroke-width="2" rx="999"/>
      <rect x="0" y="46" width="140" height="4" fill="#7a4f2c" rx="2"/>
      <circle cx="25" cy="25" r="12" fill="#7a4f2c"/>
      <text x="50" y="30" class="label">Кухня</text>
    </g>
    
    <!-- Tab: Farmer -->
    <g transform="translate(770, 10)">
      <rect width="140" height="50" fill="#ffd66b" stroke="#7a4f2c" stroke-width="2" rx="999"/>
      <rect x="0" y="46" width="140" height="4" fill="#7a4f2c" rx="2"/>
      <circle cx="25" cy="25" r="12" fill="#7a4f2c"/>
      <text x="50" y="30" class="label">Фермер</text>
    </g>
  </g>
  
  <!-- MAIN CONTENT AREA -->
  <g transform="translate(40, 170)">
    
    <!-- Stats Row -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="150" height="36" fill="#fff" stroke="#7a4f2c" stroke-width="2" rx="999"/>
      <text x="75" y="23" class="small" text-anchor="middle">Уровень: 5</text>
      
      <rect x="160" y="0" width="150" height="36" fill="#fff" stroke="#7a4f2c" stroke-width="2" rx="999"/>
      <text x="75" y="23" class="small" text-anchor="middle" transform="translate(160,0)">Продано: 42</text>
      
      <rect x="320" y="0" width="150" height="36" fill="#fff" stroke="#7a4f2c" stroke-width="2" rx="999"/>
      <text x="75" y="23" class="small" text-anchor="middle" transform="translate(320,0)">Баланс: </text>
      <text x="115" y="23" class="money" text-anchor="middle" transform="translate(320,0)">1250 ₽</text>
      
      <rect x="480" y="0" width="180" height="36" fill="#fff" stroke="#7a4f2c" stroke-width="2" rx="999"/>
      <text x="90" y="23" class="small" text-anchor="middle" transform="translate(480,0)">Салатов съедено: 2</text>
      
      <rect x="670" y="0" width="140" height="36" fill="#fff" stroke="#7a4f2c" stroke-width="2" rx="999"/>
      <text x="70" y="23" class="small" text-anchor="middle" transform="translate(670,0)">Ты худой</text>
      
      <rect x="820" y="0" width="200" height="36" fill="#fff" stroke="#7a4f2c" stroke-width="2" rx="999"/>
      <text x="100" y="23" class="small" text-anchor="middle" transform="translate(820,0)">Фермер: John Doe</text>
    </g>
    
    <!-- Profile Form Card -->
    <g transform="translate(0, 60)">
      <rect width="600" height="320" fill="rgba(255,255,255,0.88)" stroke="#7a4f2c" stroke-width="2" rx="16"/>
      <rect x="0" y="316" width="600" height="6" fill="#7a4f2c" rx="3"/>
      
      <!-- Toggle Checkbox -->
      <rect x="20" y="30" width="24" height="24" fill="#fff" stroke="#7a4f2c" stroke-width="2" rx="4"/>
      <text x="55" y="48" class="label">Ты крутой фермер?</text>
      
      <!-- Form Fields (Regular Mode) -->
      <text x="20" y="90" class="label">Имя</text>
      <rect x="20" y="100" width="260" height="44" fill="#fff" stroke="#7a4f2c" stroke-width="2" rx="10"/>
      <text x="30" y="128" class="body">Ivan</text>
      
      <text x="300" y="90" class="label">Фамилия</text>
      <rect x="300" y="100" width="260" height="44" fill="#fff" stroke="#7a4f2c" stroke-width="2" rx="10"/>
      <text x="310" y="128" class="body">Ivanov</text>
      
      <text x="20" y="170" class="label">Отчество</text>
      <rect x="20" y="180" width="260" height="44" fill="#fff" stroke="#7a4f2c" stroke-width="2" rx="10"/>
      <text x="30" y="208" class="body">Ivanovich</text>
      
      <!-- Save Button -->
      <rect x="460" y="260" width="120" height="44" fill="#7BC26B" stroke="#7a4f2c" stroke-width="2" rx="12"/>
      <rect x="460" y="300" width="120" height="4" fill="#7a4f2c" rx="2"/>
      <text x="520" y="288" class="label" text-anchor="middle" fill="#7a4f2c">Сохранить</text>
    </g>
    
    <!-- Prices & Stock Card -->
    <g transform="translate(620, 60)">
      <rect width="740" height="320" fill="rgba(255,255,255,0.88)" stroke="#7a4f2c" stroke-width="2" rx="16"/>
      <rect x="0" y="316" width="740" height="6" fill="#7a4f2c" rx="3"/>
      
      <text x="20" y="40" class="title">Цены и запасы</text>
      
      <!-- Stock Items Grid -->
      <g transform="translate(20, 70)">
        <rect x="0" y="0" width="220" height="36" fill="#fff" stroke="#7a4f2c" stroke-width="2" rx="999"/>
        <text x="110" y="23" class="small" text-anchor="middle">Йогурта на складе: 2500 мл</text>
        
        <rect x="240" y="0" width="220" height="36" fill="#fff" stroke="#7a4f2c" stroke-width="2" rx="999"/>
        <text x="110" y="23" class="small" text-anchor="middle" transform="translate(240,0)">Масла на складе: 800 мл</text>
        
        <rect x="480" y="0" width="220" height="36" fill="#fff" stroke="#7a4f2c" stroke-width="2" rx="999"/>
        <text x="110" y="23" class="small" text-anchor="middle" transform="translate(480,0)">Картофель: 15 шт.</text>
        
        <rect x="0" y="50" width="220" height="36" fill="#fff" stroke="#7a4f2c" stroke-width="2" rx="999"/>
        <text x="110" y="23" class="small" text-anchor="middle" transform="translate(0,50)">Морковь: 8 шт.</text>
        
        <rect x="240" y="50" width="220" height="36" fill="#fff" stroke="#7a4f2c" stroke-width="2" rx="999"/>
        <text x="110" y="23" class="small" text-anchor="middle" transform="translate(240,50)">Капуста: 12 шт.</text>
        
        <rect x="480" y="50" width="220" height="36" fill="#fff" stroke="#7a4f2c" stroke-width="2" rx="999"/>
        <text x="110" y="23" class="small" text-anchor="middle" transform="translate(480,50)">Редис: 20 шт.</text>
        
        <rect x="0" y="100" width="220" height="36" fill="#fff" stroke="#7a4f2c" stroke-width="2" rx="999"/>
        <text x="110" y="23" class="small" text-anchor="middle" transform="translate(0,100)">Баклажан: 5 шт.</text>
        
        <rect x="240" y="100" width="220" height="36" fill="#fff" stroke="#7a4f2c" stroke-width="2" rx="999"/>
        <text x="110" y="23" class="small" text-anchor="middle" transform="translate(240,100)">Манго: 10 шт.</text>
      </g>
    </g>
  </g>
  
  <!-- SPECIFICATIONS PANEL -->
  <g transform="translate(40, 600)">
    <text x="0" y="0" class="title">SPECIFICATIONS — PROFILE TAB</text>
    
    <g transform="translate(0, 40)">
      <text x="0" y="0" class="label">Header:</text>
      <text x="0" y="25" class="small">- Height: 80px</text>
      <text x="0" y="45" class="small">- Background: rgba(255,255,255,0.7) with backdrop-filter blur</text>
      <text x="0" y="65" class="small">- Logo: 40x40px circle, #ffd66b</text>
      <text x="0" y="85" class="small">- Logout Button: 120x40px, #e84c3d, white text</text>
      
      <text x="0" y="120" class="label">Tabs Bar:</text>
      <text x="0" y="145" class="small">- Height: 70px</text>
      <text x="0" y="165" class="small">- Tab Size: 140x50px</text>
      <text x="0" y="185" class="small">- Active Tab: bg=#fff, Inactive: bg=#ffd66b</text>
      <text x="0" y="205" class="small">- Icon: 24x24px circle</text>
      <text x="0" y="225" class="small">- Gap: 10px between tabs</text>
      
      <text x="0" y="260" class="label">Stats Badges:</text>
      <text x="0" y="285" class="small">- Size: variable width x 36px</text>
      <text x="0" y="305" class="small">- Border Radius: 999px (pill)</text>
      <text x="0" y="325" class="small">- Font: 12px, #5d4037</text>
      <text x="0" y="345" class="small">- Money value: 14px ExtraBold, #1b5e20</text>
      
      <text x="0" y="380" class="label">Cards:</text>
      <text x="0" y="405" class="small">- Background: rgba(255,255,255,0.88)</text>
      <text x="0" y="425" class="small">- Border: 2px #7a4f2c</text>
      <text x="0" y="445" class="small">- Border Radius: 16px</text>
      <text x="0" y="465" class="small">- Shadow: 0 6px 0 #7a4f2c</text>
      <text x="0" y="485" class="small">- Padding: 20px</text>
      
      <text x="0" y="520" class="label">Input Fields:</text>
      <text x="0" y="545" class="small">- Size: 260x44px</text>
      <text x="0" y="565" class="small">- Border Radius: 10px</text>
      <text x="0" y="585" class="small">- Label: 16px Bold, above input</text>
      
      <text x="0" y="620" class="label">Buttons:</text>
      <text x="0" y="645" class="small">- Primary: 120x44px, #7BC26B, shadow 0 4px 0</text>
      <text x="0" y="665" class="small">- Text: 16px Bold, #7a4f2c</text>
      
      <text x="0" y="700" class="label">Layout:</text>
      <text x="0" y="725" class="small">- Main Padding: 20px</text>
      <text x="0" y="745" class="small">- Grid Gap: 16px</text>
      <text x="0" y="765" class="small">- Two-column grid for cards (600px + 740px)</text>
    </g>
  </g>
</svg>
