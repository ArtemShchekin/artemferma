<svg width="1440" height="2600" viewBox="0 0 1440 2600" xmlns="http://www.w3.org/2000/svg">
  <!-- PAGE: SHOP TAB -->
  <!-- Farm Game — Shop Screen Mockup for Figma -->
  
  <defs>
    <style>
      .title { font-family: 'Comic Sans MS', cursive; font-size: 24px; font-weight: 700; fill: #7a4f2c; }
      .label { font-family: 'Comic Sans MS', cursive; font-size: 16px; font-weight: 700; fill: #7a4f2c; }
      .body { font-family: 'Comic Sans MS', cursive; font-size: 14px; fill: #5d4037; }
      .money { font-family: 'Comic Sans MS', cursive; font-size: 14px; font-weight: 800; fill: #1b5e20; }
      .small { font-family: 'Comic Sans MS', cursive; font-size: 12px; fill: #5d4037; }
    </style>
  </defs>
  
  <!-- BACKGROUND -->
  <rect width="1440" height="2600" fill="#f7f2ef"/>
  
  <!-- HEADER -->
  <g transform="translate(0, 0)">
    <rect width="1440" height="80" fill="rgba(255,255,255,0.7)"/>
    <circle cx="60" cy="40" r="20" fill="#ffd66b" stroke="#7a4f2c" stroke-width="2"/>
    <text x="60" y="47" text-anchor="middle" class="label" font-size="20">🥕</text>
    <rect x="100" y="25" width="100" height="30" fill="#ffd66b" stroke="#7a4f2c" stroke-width="2" rx="999"/>
    <text x="150" y="45" class="label" text-anchor="middle">Ферма</text>
    <rect x="1280" y="20" width="120" height="40" fill="#e84c3d" stroke="#7a4f2c" stroke-width="2" rx="12"/>
    <text x="1340" y="45" class="label" text-anchor="middle" fill="#fff">Выйти</text>
  </g>
  
  <!-- TABS NAVIGATION -->
  <g transform="translate(0, 80)">
    <rect width="1440" height="70" fill="#f7f2ef"/>
    
    <!-- Tab: Profile -->
    <g transform="translate(20, 10)">
      <rect width="140" height="50" fill="#ffd66b" stroke="#7a4f2c" stroke-width="2" rx="999"/>
      <rect x="0" y="46" width="140" height="4" fill="#7a4f2c" rx="2"/>
      <circle cx="25" cy="25" r="12" fill="#7a4f2c"/>
      <text x="50" y="30" class="label">Профиль</text>
    </g>
    
    <!-- Tab: Shop (Active) -->
    <g transform="translate(170, 10)">
      <rect width="140" height="50" fill="#ffffff" stroke="#7a4f2c" stroke-width="2" rx="999"/>
      <circle cx="25" cy="25" r="12" fill="#7a4f2c"/>
      <text x="50" y="30" class="label">Магазин</text>
    </g>
    
    <!-- Tab: Garden -->
    <g transform="translate(320, 10)">
      <rect width="140" height="50" fill="#ffd66b" stroke="#7a4f2c" stroke-width="2" rx="999"/>
      <rect x="0" y="46" width="140" height="4" fill="#7a4f2c" rx="2"/>
      <circle cx="25" cy="25" r="12" fill="#7a4f2c"/>
      <text x="50" y="30" class="label">Грядка</text>
    </g>
    
    <!-- Tab: Inventory -->
    <g transform="translate(470, 10)">
      <rect width="140" height="50" fill="#ffd66b" stroke="#7a4f2c" stroke-width="2" rx="999"/>
      <rect x="0" y="46" width="140" height="4" fill="#7a4f2c" rx="2"/>
      <circle cx="25" cy="25" r="12" fill="#7a4f2c"/>
      <text x="50" y="30" class="label">Инвентарь</text>
    </g>
    
    <!-- Tab: Kitchen -->
    <g transform="translate(620, 10)">
      <rect width="140" height="50" fill="#ffd66b" stroke="#7a4f2c" stroke-width="2" rx="999"/>
      <rect x="0" y="46" width="140" height="4" fill="#7a4f2c" rx="2"/>
      <circle cx="25" cy="25" r="12" fill="#7a4f2c"/>
      <text x="50" y="30" class="label">Кухня</text>
    </g>
    
    <!-- Tab: Farmer -->
    <g transform="translate(770, 10)">
      <rect width="140" height="50" fill="#ffd66b" stroke="#7a4f2c" stroke-width="2" rx="999"/>
      <rect x="0" y="46" width="140" height="4" fill="#7a4f2c" rx="2"/>
      <circle cx="25" cy="25" r="12" fill="#7a4f2c"/>
      <text x="50" y="30" class="label">Фермер</text>
    </g>
  </g>
  
  <!-- MAIN CONTENT AREA -->
  <g transform="translate(40, 170)">
    
    <!-- Mode Switcher Tabs -->
    <g transform="translate(0, 0)">
      <!-- Buy Tab (Active) -->
      <g transform="translate(0, 0)">
        <rect width="180" height="50" fill="#7BC26B" stroke="#7a4f2c" stroke-width="2" rx="12"/>
        <rect x="0" y="46" width="180" height="4" fill="#7a4f2c" rx="2"/>
        <circle cx="30" cy="25" r="12" fill="#7a4f2c"/>
        <text x="55" y="30" class="label" fill="#7a4f2c">Покупка</text>
      </g>
      
      <!-- Sell Tab -->
      <g transform="translate(190, 0)">
        <rect width="180" height="50" fill="#ffd66b" stroke="#7a4f2c" stroke-width="2" rx="12"/>
        <rect x="0" y="46" width="180" height="4" fill="#7a4f2c" rx="2"/>
        <circle cx="30" cy="25" r="12" fill="#7a4f2c"/>
        <text x="55" y="30" class="label" fill="#7a4f2c">Продажа</text>
      </g>
    </g>
    
    <!-- Seeds Level 1 Card -->
    <g transform="translate(0, 70)">
      <rect width="440" height="340" fill="rgba(255,255,255,0.88)" stroke="#7a4f2c" stroke-width="2" rx="16"/>
      <rect x="0" y="336" width="440" height="6" fill="#7a4f2c" rx="3"/>
      
      <text x="20" y="40" class="title">Семена уровня 1 (по 50 ₽)</text>
      
      <!-- Item: Potato -->
      <g transform="translate(20, 70)">
        <rect width="400" height="60" fill="#fff" stroke="#7a4f2c" stroke-width="2" stroke-dasharray="4,4" rx="12"/>
        <circle cx="45" cy="30" r="20" fill="#ffd66b"/>
        <text x="80" y="35" class="body">Картофель</text>
        <rect x="280" y="8" width="100" height="44" fill="#7BC26B" stroke="#7a4f2c" stroke-width="2" rx="12"/>
        <text x="330" y="35" class="label" text-anchor="middle" fill="#7a4f2c">Купить</text>
      </g>
      
      <!-- Item: Carrot -->
      <g transform="translate(20, 140)">
        <rect width="400" height="60" fill="#fff" stroke="#7a4f2c" stroke-width="2" stroke-dasharray="4,4" rx="12"/>
        <circle cx="45" cy="30" r="20" fill="#e84c3d"/>
        <text x="80" y="35" class="body">Морковь</text>
        <rect x="280" y="8" width="100" height="44" fill="#7BC26B" stroke="#7a4f2c" stroke-width="2" rx="12"/>
        <text x="330" y="35" class="label" text-anchor="middle" fill="#7a4f2c">Купить</text>
      </g>
      
      <!-- Item: Cabbage -->
      <g transform="translate(20, 210)">
        <rect width="400" height="60" fill="#fff" stroke="#7a4f2c" stroke-width="2" stroke-dasharray="4,4" rx="12"/>
        <circle cx="45" cy="30" r="20" fill="#7BC26B"/>
        <text x="80" y="35" class="body">Капуста</text>
        <rect x="280" y="8" width="100" height="44" fill="#7BC26B" stroke="#7a4f2c" stroke-width="2" rx="12"/>
        <text x="330" y="35" class="label" text-anchor="middle" fill="#7a4f2c">Купить</text>
      </g>
      
      <!-- Item: Radish -->
      <g transform="translate(20, 280)">
        <rect width="400" height="60" fill="#fff" stroke="#7a4f2c" stroke-width="2" stroke-dasharray="4,4" rx="12"/>
        <circle cx="45" cy="30" r="20" fill="#e84c3d" opacity="0.7"/>
        <text x="80" y="35" class="body">Редис</text>
        <rect x="280" y="8" width="100" height="44" fill="#7BC26B" stroke="#7a4f2c" stroke-width="2" rx="12"/>
        <text x="330" y="35" class="label" text-anchor="middle" fill="#7a4f2c">Купить</text>
      </g>
    </g>
    
    <!-- Seeds Level 2 Card -->
    <g transform="translate(460, 70)">
      <rect width="440" height="340" fill="rgba(255,255,255,0.88)" stroke="#7a4f2c" stroke-width="2" rx="16"/>
      <rect x="0" y="336" width="440" height="6" fill="#7a4f2c" rx="3"/>
      
      <text x="20" y="40" class="title">Семена уровня 2 (по 100 ₽)</text>
      
      <!-- Item: Eggplant (Locked) -->
      <g transform="translate(20, 70)" opacity="0.5">
        <rect width="400" height="60" fill="#fff" stroke="#7a4f2c" stroke-width="2" stroke-dasharray="4,4" rx="12"/>
        <circle cx="45" cy="30" r="20" fill="#7a4f2c"/>
        <text x="80" y="35" class="body">Баклажан</text>
        <rect x="280" y="8" width="100" height="44" fill="#ccc" stroke="#7a4f2c" stroke-width="2" rx="12"/>
        <text x="330" y="35" class="label" text-anchor="middle" fill="#7a4f2c">Купить</text>
      </g>
      
      <!-- Item: Mango (Locked) -->
      <g transform="translate(20, 140)" opacity="0.5">
        <rect width="400" height="60" fill="#fff" stroke="#7a4f2c" stroke-width="2" stroke-dasharray="4,4" rx="12"/>
        <circle cx="45" cy="30" r="20" fill="#ffd66b"/>
        <text x="80" y="35" class="body">Манго</text>
        <rect x="280" y="8" width="100" height="44" fill="#ccc" stroke="#7a4f2c" stroke-width="2" rx="12"/>
        <text x="330" y="35" class="label" text-anchor="middle" fill="#7a4f2c">Купить</text>
      </g>
      
      <text x="220" y="280" class="body" text-anchor="middle" font-style="italic">Доступно с уровня 2</text>
    </g>
    
    <!-- Kitchen Supplies Card -->
    <g transform="translate(920, 70)">
      <rect width="440" height="220" fill="rgba(255,255,255,0.88)" stroke="#7a4f2c" stroke-width="2" rx="16"/>
      <rect x="0" y="216" width="440" height="6" fill="#7a4f2c" rx="3"/>
      
      <text x="20" y="40" class="title">Продукты для кухни</text>
      
      <!-- Item: Yogurt -->
      <g transform="translate(20, 70)">
        <rect width="400" height="60" fill="#fff" stroke="#7a4f2c" stroke-width="2" stroke-dasharray="4,4" rx="12"/>
        <circle cx="45" cy="30" r="20" fill="#b3e5ff"/>
        <text x="80" y="30" class="body">Йогурт (500 мл)</text>
        <text x="80" y="48" class="small">Цена: 150 ₽</text>
        <rect x="280" y="8" width="100" height="44" fill="#7BC26B" stroke="#7a4f2c" stroke-width="2" rx="12"/>
        <text x="330" y="35" class="label" text-anchor="middle" fill="#7a4f2c">Купить</text>
      </g>
      
      <!-- Item: Sunflower Oil -->
      <g transform="translate(20, 140)">
        <rect width="400" height="60" fill="#fff" stroke="#7a4f2c" stroke-width="2" stroke-dasharray="4,4" rx="12"/>
        <circle cx="45" cy="30" r="20" fill="#ffd66b"/>
        <text x="80" y="30" class="body">Подсолнечное масло (200 мл)</text>
        <text x="80" y="48" class="small">Цена: 80 ₽</text>
        <rect x="280" y="8" width="100" height="44" fill="#7BC26B" stroke="#7a4f2c" stroke-width="2" rx="12"/>
        <text x="330" y="35" class="label" text-anchor="middle" fill="#7a4f2c">Купить</text>
      </g>
    </g>
    
    <!-- Sell Mode Card (Hidden by default, shown for reference) -->
    <g transform="translate(0, 430)" opacity="0.3">
      <rect width="900" height="200" fill="rgba(255,255,255,0.88)" stroke="#7a4f2c" stroke-width="2" rx="16"/>
      <text x="20" y="40" class="title">Режим продажи (неактивен)</text>
      <text x="20" y="80" class="body">Здесь отображаются вымытые овощи для продажи.</text>
      <text x="20" y="110" class="small">- Каждый товар: иконка 36x36px</text>
      <text x="20" y="130" class="small">- Кнопка "Продать": 100x44px, #7BC26B</text>
      <text x="20" y="150" class="small">- Layout: flex, space-between</text>
    </g>
  </g>
  
  <!-- SPECIFICATIONS PANEL -->
  <g transform="translate(40, 700)">
    <text x="0" y="0" class="title">SPECIFICATIONS — SHOP TAB</text>
    
    <g transform="translate(0, 40)">
      <text x="0" y="0" class="label">Mode Switcher:</text>
      <text x="0" y="25" class="small">- Size: 180x50px each</text>
      <text x="0" y="45" class="small">- Active: bg=#7BC26B, Inactive: bg=#ffd66b</text>
      <text x="0" y="65" class="small">- Border Radius: 12px</text>
      <text x="0" y="85" class="small">- Gap: 10px</text>
      
      <text x="0" y="120" class="label">Product Cards:</text>
      <text x="0" y="145" class="small">- Size: 440x340px (Level 1 &amp; 2), 440x220px (Supplies)</text>
      <text x="0" y="165" class="small">- Background: rgba(255,255,255,0.88)</text>
      <text x="0" y="185" class="small">- Shadow: 0 6px 0 #7a4f2c</text>
      
      <text x="0" y="220" class="label">Shop Item Row:</text>
      <text x="0" y="245" class="small">- Size: 400x60px</text>
      <text x="0" y="265" class="small">- Border: 2px dashed #7a4f2c</text>
      <text x="0" y="285" class="small">- Icon: 40x40px circle</text>
      <text x="0" y="305" class="small">- Button: 100x44px, #7BC26B</text>
      <text x="0" y="325" class="small">- Gap between items: 10px</text>
      
      <text x="0" y="360" class="label">Pricing Text:</text>
      <text x="0" y="385" class="small">- Level 1 seeds: 50 ₽ each</text>
      <text x="0" y="405" class="small">- Level 2 seeds: 100 ₽ each (locked until level 2)</text>
      <text x="0" y="425" class="small">- Yogurt: 150 ₽ for 500ml</text>
      <text x="0" y="445" class="small">- Sunflower Oil: 80 ₽ for 200ml</text>
      
      <text x="0" y="480" class="label">Layout:</text>
      <text x="0" y="505" class="small">- Three-column grid for cards</text>
      <text x="0" y="525" class="small">- Grid Gap: 20px</text>
      <text x="0" y="545" class="small">- Main Padding: 20px</text>
      
      <text x="0" y="580" class="label">States:</text>
      <text x="0" y="605" class="small">- Locked items: opacity 0.5, button disabled (bg=#ccc)</text>
      <text x="0" y="625" class="small">- Empty state: text "Пусто" centered</text>
    </g>
  </g>
</svg>
